name: Multi Environment Helm Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup gcloud (with GKE plugin)
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region ${{ secrets.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Order Service (DEV)
        run: |
          helm upgrade --install order-service ./helm-charts/order-service \
            -f ./helm-charts/order-service/values.dev.yaml \
            --namespace dev \
            --create-namespace

      - name: Deploy User Service (DEV)
        run: |
          helm upgrade --install user-service ./helm-charts/user-service \
            -f ./helm-charts/user-service/values.dev.yaml \
            --namespace dev \
            --create-namespace


  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: uat   # triggers manual approval if enabled

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup gcloud (with GKE plugin)
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region ${{ secrets.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Order Service (UAT)
        run: |
          helm upgrade --install order-service ./helm-charts/order-service \
            -f ./helm-charts/order-service/values.uat.yaml \
            --namespace uat \
            --create-namespace

      - name: Deploy User Service (UAT)
        run: |
          helm upgrade --install user-service ./helm-charts/user-service \
            -f ./helm-charts/user-service/values.uat.yaml \
            --namespace uat \
            --create-namespace
