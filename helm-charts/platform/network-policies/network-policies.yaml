apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-to-user
  namespace: {{ .Values.namespace }}

spec:
  podSelector:
    matchLabels:
      app: user-service

  policyTypes:
  - Ingress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: order-service