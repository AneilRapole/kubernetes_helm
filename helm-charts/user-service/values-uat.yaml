name: user-service

replicaCount: 2

image:
  repository: europe-west2-docker.pkg.dev/newuat/myhomerepo/user-service
  tag: "1.0"

containerPort: 5000

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

resources:
  requests:
    cpu: "100m"
  limits:
    cpu: "200m"

env: uat

config:
  orderServiceUrl: "http://order-service.uat.svc.cluster.local"