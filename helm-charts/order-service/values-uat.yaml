replicaCount: 2

deployment:
  name: order-service

image:
  repository: europe-west2-docker.pkg.dev/newuat/myhomerepo/order-service
  tag: "1.0"

containerPort: 5001

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

resources:
  requests:
    cpu: "200m"
  limits:
    cpu: "400m"

env: uat

config:
  userServiceUrl: "http://user-service.uat.svc.cluster.local"
  orderServiceUrl: "http://order-service.uat.svc.cluster.local"